<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- iOS ignores most of the manifest; these meta tags drive standalone home-screen mode. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sky Obby" />
    <meta name="theme-color" content="#6ec2f7" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="./icons/icon-192.png" />
    <title>Sky Island Obby</title>
    <style>
      :root {
        color-scheme: light;
        --ui-font:
          "Arial Rounded MT Bold", ui-rounded, "Hiragino Maru Gothic ProN", "Comic Sans MS",
          system-ui, sans-serif;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #6ec2f7;
        font-family: var(--ui-font);
        /* Prevent iOS Safari rubber-banding / double-tap zoom on the game surface. */
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      #ui {
        position: fixed;
        inset: 0;
        pointer-events: none;
        /* Keep UI clear of the iPad notch/home-indicator in standalone mode. */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
      }
      #ui button {
        pointer-events: auto;
        font-family: var(--ui-font);
        border: none;
        cursor: pointer;
        touch-action: manipulation;
      }

      /* ---------- HUD ---------- */
      .hud-pill {
        position: absolute;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 999px;
        padding: 8px 18px;
        font-size: 22px;
        font-weight: bold;
        color: #35415a;
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.15);
      }
      #hud-coins {
        top: 14px;
        left: 14px;
      }
      #hud-course {
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        min-width: 180px;
        justify-content: center;
      }
      #hud-course .timer {
        font-variant-numeric: tabular-nums;
        color: #1e7ac2;
      }
      .hud-btns {
        position: absolute;
        top: 14px;
        right: 14px;
        display: flex;
        gap: 10px;
      }
      .round-btn {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.92);
        font-size: 26px;
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.15);
      }
      .round-btn:active {
        transform: translateY(2px);
        box-shadow: none;
      }

      /* ---------- Touch controls ---------- */
      #joy-base,
      #joy-knob {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        display: none;
        transform: translate(-50%, -50%);
      }
      #joy-base {
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.22);
        border: 3px solid rgba(255, 255, 255, 0.55);
      }
      #joy-knob {
        width: 56px;
        height: 56px;
        background: rgba(255, 255, 255, 0.75);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
      }
      #jump-btn {
        position: absolute;
        right: 28px;
        bottom: 34px;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: rgba(255, 214, 64, 0.95);
        border: 4px solid rgba(255, 255, 255, 0.8);
        font-size: 20px;
        font-weight: bold;
        color: #7a5200;
        box-shadow: 0 5px 0 rgba(0, 0, 0, 0.2);
        display: none;
      }
      #jump-btn:active {
        transform: translateY(3px);
        box-shadow: none;
      }
      body.touch-mode #jump-btn {
        display: block;
      }

      /* ---------- Overlays (menu / shop) ---------- */
      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        pointer-events: auto;
        background: rgba(30, 60, 100, 0.45);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
      }
      .overlay.hidden {
        display: none;
      }
      #menu {
        background: linear-gradient(#6ec2f7, #b8e4ff);
      }
      .game-title {
        font-size: clamp(40px, 8vw, 76px);
        color: #ffffff;
        text-shadow:
          0 4px 0 #2f8fd4,
          0 8px 18px rgba(0, 0, 0, 0.25);
        text-align: center;
        line-height: 1.05;
        margin: 0;
      }
      .big-btn {
        font-size: 28px;
        font-weight: bold;
        padding: 18px 54px;
        border-radius: 999px;
        color: #fff;
        background: #43c465;
        box-shadow: 0 6px 0 #2c9448;
      }
      .big-btn:active {
        transform: translateY(4px);
        box-shadow: 0 2px 0 #2c9448;
      }
      .menu-hint {
        color: #2b5d85;
        font-size: 16px;
        text-align: center;
        max-width: 480px;
      }

      /* ---------- Shop ---------- */
      .shop-panel {
        background: #fffef7;
        border-radius: 24px;
        width: min(92vw, 640px);
        max-height: 84vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      }
      .shop-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        background: #ffd640;
        font-size: 24px;
        font-weight: bold;
        color: #7a5200;
      }
      .shop-tabs {
        display: flex;
        gap: 8px;
        padding: 10px 16px 0;
      }
      .shop-tabs button {
        flex: 1;
        font-size: 18px;
        font-weight: bold;
        padding: 10px;
        border-radius: 12px 12px 0 0;
        background: #e8e4d4;
        color: #6b6552;
      }
      .shop-tabs button.active {
        background: #43c465;
        color: #fff;
      }
      .shop-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 12px;
        padding: 16px;
        overflow-y: auto;
      }
      .shop-item {
        border-radius: 16px;
        background: #f2efe2;
        padding: 12px 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        font-weight: bold;
        color: #4a4536;
        text-align: center;
      }
      .shop-item .swatch {
        width: 54px;
        height: 54px;
        border-radius: 12px;
        border: 3px solid rgba(0, 0, 0, 0.1);
      }
      .shop-item .swatch-emoji {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        background: #fff;
      }
      /* Rarity tiers: card border + label color. */
      .shop-item.r-common {
        border: 3px solid #c9c4b2;
      }
      .shop-item.r-rare {
        border: 3px solid #53b9ff;
      }
      .shop-item.r-epic {
        border: 3px solid #b46fff;
      }
      .shop-item.r-legendary {
        border: 3px solid #ffb020;
        box-shadow: 0 0 12px rgba(255, 176, 32, 0.5);
      }
      .rarity-label {
        font-size: 12px;
        opacity: 0.75;
      }
      .r-rare .rarity-label {
        color: #1e7ac2;
      }
      .r-epic .rarity-label {
        color: #7a3fc1;
      }
      .r-legendary .rarity-label {
        color: #b0641a;
      }
      .shop-item button {
        font-size: 15px;
        font-weight: bold;
        padding: 8px 16px;
        border-radius: 999px;
        background: #43c465;
        color: #fff;
      }
      .shop-item button.equipped {
        background: #1e7ac2;
      }
      .shop-item button:disabled {
        background: #c9c4b2;
        cursor: default;
      }

      /* ---------- Customizer (Style Studio) ---------- */
      #customizer {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(46vw, 420px);
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 16px;
        padding-top: calc(16px + env(safe-area-inset-top));
        background: rgba(255, 254, 247, 0.96);
        border-radius: 24px 0 0 24px;
        box-shadow: -8px 0 30px rgba(0, 0, 0, 0.3);
        pointer-events: auto;
      }
      #customizer.hidden {
        display: none;
      }
      .customizer-head {
        font-size: 26px;
        font-weight: bold;
        color: #7a3fc1;
        text-align: center;
      }
      .customizer-body {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .customizer-title {
        font-size: 17px;
        font-weight: bold;
        color: #4a4536;
        margin-bottom: 6px;
      }
      .customizer-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .customizer-chip {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        border: 3px solid rgba(0, 0, 0, 0.12);
        background: #fff;
        font-size: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .customizer-chip.selected {
        border-color: #43c465;
        box-shadow: 0 0 0 3px rgba(67, 196, 101, 0.4);
      }
      .customizer-hint {
        font-size: 13px;
        color: #8a8470;
        margin-top: 4px;
      }
      .customizer-done {
        align-self: center;
        font-size: 22px;
        padding: 12px 44px;
      }
      .round-btn.off {
        opacity: 0.35;
      }

      /* ---------- Settings ---------- */
      .settings-panel {
        width: min(92vw, 520px);
      }
      .settings-body {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 18px 20px;
        overflow-y: auto;
      }
      .settings-label {
        font-size: 15px;
        font-weight: bold;
        color: #4a4536;
        margin-top: 6px;
      }
      .settings-code {
        width: 100%;
        box-sizing: border-box;
        font-family: ui-monospace, "SF Mono", Consolas, monospace;
        font-size: 13px;
        padding: 10px;
        border-radius: 12px;
        border: 2px solid #d8d4c2;
        background: #fbfaf4;
        color: #4a4536;
        resize: none;
      }
      .settings-btn {
        align-self: center;
        font-size: 18px;
        padding: 10px 28px;
      }
      .restore-btn {
        background: #2bb3f3;
        box-shadow: 0 6px 0 #1e7ac2;
      }
      .settings-status {
        min-height: 22px;
        font-size: 14px;
        font-weight: bold;
        text-align: center;
        color: #4a4536;
      }

      /* ---------- Toast ---------- */
      #toast {
        position: absolute;
        top: 22%;
        left: 50%;
        transform: translateX(-50%);
        font-size: clamp(28px, 5vw, 44px);
        font-weight: bold;
        color: #fff;
        text-shadow:
          0 3px 0 #2f8fd4,
          0 6px 14px rgba(0, 0, 0, 0.3);
        opacity: 0;
        transition: opacity 0.25s;
        pointer-events: none;
        text-align: center;
        white-space: pre-line;
      }
      #toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui"></div>
    <div id="joy-base"></div>
    <div id="joy-knob"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
